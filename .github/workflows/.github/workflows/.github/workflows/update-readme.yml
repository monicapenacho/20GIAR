name: Auto Update README from Tests

on:
  push:
    paths:
      - 'test/**'

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # necesario para crear ramas

      - name: Set up Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Generate README from tests
        run: |
          echo "# Test Summary" > README.md
          echo "" >> README.md
          echo "Updated automatically from test files" >> README.md
          echo "" >> README.md
          ls test >> README.md

      - name: Create new branch
        id: branch
        run: |
          BRANCH_NAME="auto/readme-update-$(date +%s)"
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
          git checkout -b $BRANCH_NAME

      - name: Commit changes
        run: |
          git add README.md
          git commit -m "Auto update README from test changes" || echo "No changes to commit"

      - name: Push branch
        run: |
          git push origin ${{ steps.branch.outputs.branch }}